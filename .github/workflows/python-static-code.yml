name: Python Static Code Analysis

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full history for pylint to work with git ls-files

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install static analysis tools
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 pylint mypy

      - name: Run Black (code formatting check)
        id: black
        run: |
          echo "## 🖤 Black Code Formatting Check" > analysis-report.md
          echo "" >> analysis-report.md
          set +e  # Don't exit on error
          black --check . > black-output.txt 2>&1
          BLACK_EXIT_CODE=$?
          BLACK_FILE_COUNT=$(grep -c "would reformat" black-output.txt || echo "0")
          set -e  # Re-enable exit on error
          if [ $BLACK_EXIT_CODE -eq 0 ]; then
            echo "✅ **Black**: All files are properly formatted" >> analysis-report.md
            echo "black_status=✅ PASSED" >> $GITHUB_OUTPUT
          elif [ $BLACK_FILE_COUNT -le 3 ]; then
            echo "⚠️ **Black**: Minor formatting issues found ($BLACK_FILE_COUNT files), but acceptable" >> analysis-report.md
            echo "black_status=⚠️ PASSED WITH WARNINGS" >> $GITHUB_OUTPUT
          else
            echo "❌ **Black**: Too many formatting issues found ($BLACK_FILE_COUNT files)" >> analysis-report.md
            echo "black_status=❌ FAILED" >> $GITHUB_OUTPUT
          fi
          echo "" >> analysis-report.md
          echo '```' >> analysis-report.md
          cat black-output.txt >> analysis-report.md
          echo '```' >> analysis-report.md
          echo "" >> analysis-report.md
        continue-on-error: true

      - name: Run isort (import sorting check)
        id: isort
        run: |
          echo "## 📦 isort Import Sorting Check" >> analysis-report.md
          echo "" >> analysis-report.md
          set +e  # Don't exit on error
          isort --check-only . > isort-output.txt 2>&1
          ISORT_EXIT_CODE=$?
          set -e  # Re-enable exit on error
          if [ $ISORT_EXIT_CODE -eq 0 ]; then
            echo "✅ **isort**: All imports are properly sorted" >> analysis-report.md
            echo "isort_status=✅ PASSED" >> $GITHUB_OUTPUT
          else
            echo "❌ **isort**: Import sorting issues found" >> analysis-report.md
            echo "isort_status=❌ FAILED" >> $GITHUB_OUTPUT
          fi
          echo "" >> analysis-report.md
          echo '```' >> analysis-report.md
          cat isort-output.txt >> analysis-report.md
          echo '```' >> analysis-report.md
          echo "" >> analysis-report.md
        continue-on-error: true

      - name: Run flake8 (style and syntax check)
        id: flake8
        run: |
          echo "## 🔍 flake8 Style and Syntax Check" >> analysis-report.md
          echo "" >> analysis-report.md
          set +e  # Don't exit on error
          flake8 . > flake8-output.txt 2>&1
          FLAKE8_EXIT_CODE=$?
          FLAKE8_ISSUE_COUNT=$(grep -c ":" flake8-output.txt || echo "0")
          set -e  # Re-enable exit on error
          if [ $FLAKE8_EXIT_CODE -eq 0 ]; then
            echo "✅ **flake8**: No style or syntax issues found" >> analysis-report.md
            echo "flake8_status=✅ PASSED" >> $GITHUB_OUTPUT
          elif [ $FLAKE8_ISSUE_COUNT -le 10 ]; then
            echo "⚠️ **flake8**: Minor style issues found ($FLAKE8_ISSUE_COUNT), but acceptable" >> analysis-report.md
            echo "flake8_status=⚠️ PASSED WITH WARNINGS" >> $GITHUB_OUTPUT
          else
            echo "❌ **flake8**: Too many style issues found ($FLAKE8_ISSUE_COUNT)" >> analysis-report.md
            echo "flake8_status=❌ FAILED" >> $GITHUB_OUTPUT
          fi
          echo "" >> analysis-report.md
          echo '```' >> analysis-report.md
          cat flake8-output.txt >> analysis-report.md
          echo '```' >> analysis-report.md
          echo "" >> analysis-report.md
        continue-on-error: true

      - name: Run pylint (comprehensive code analysis)
        id: pylint
        run: |
          echo "## 🔎 pylint Comprehensive Code Analysis" >> analysis-report.md
          echo "" >> analysis-report.md
          # Get Python files and run pylint
          python_files=$(git ls-files '*.py')
          if [ -n "$python_files" ]; then
            set +e  # Don't exit on error
            pylint $python_files > pylint-output.txt 2>&1
            PYLINT_EXIT_CODE=$?
            # Extract pylint score if available
            PYLINT_SCORE=$(grep -o "Your code has been rated at [0-9]*\.[0-9]*" pylint-output.txt | grep -o "[0-9]*\.[0-9]*" || echo "0")
            set -e  # Re-enable exit on error
            if [ $PYLINT_EXIT_CODE -eq 0 ]; then
              echo "✅ **pylint**: No issues found (Score: ${PYLINT_SCORE}/10)" >> analysis-report.md
              echo "pylint_status=✅ PASSED" >> $GITHUB_OUTPUT
            elif [ "$(echo "$PYLINT_SCORE >= 7.0" | bc -l 2>/dev/null || echo 0)" -eq 1 ]; then
              echo "⚠️ **pylint**: Some issues found but acceptable score (${PYLINT_SCORE}/10)" >> analysis-report.md
              echo "pylint_status=⚠️ PASSED WITH WARNINGS" >> $GITHUB_OUTPUT
            else
              echo "❌ **pylint**: Issues found in code analysis (Score: ${PYLINT_SCORE}/10)" >> analysis-report.md
              echo "pylint_status=❌ FAILED" >> $GITHUB_OUTPUT
            fi
            echo "" >> analysis-report.md
            echo '```' >> analysis-report.md
            cat pylint-output.txt >> analysis-report.md
            echo '```' >> analysis-report.md
          else
            echo "ℹ️ **pylint**: No Python files found to analyze" >> analysis-report.md
            echo "pylint_status=ℹ️ NO FILES" >> $GITHUB_OUTPUT
          fi
          echo "" >> analysis-report.md
        continue-on-error: true

      - name: Run mypy (type checking)
        id: mypy
        run: |
          echo "## 🎯 mypy Type Checking" >> analysis-report.md
          echo "" >> analysis-report.md
          set +e  # Don't exit on error
          mypy . > mypy-output.txt 2>&1
          MYPY_EXIT_CODE=$?
          MYPY_ERROR_COUNT=$(grep -c "error:" mypy-output.txt || echo "0")
          set -e  # Re-enable exit on error
          if [ $MYPY_EXIT_CODE -eq 0 ]; then
            echo "✅ **mypy**: No type checking issues found" >> analysis-report.md
            echo "mypy_status=✅ PASSED" >> $GITHUB_OUTPUT
          elif [ $MYPY_ERROR_COUNT -le 5 ]; then
            echo "⚠️ **mypy**: Minor type checking issues found ($MYPY_ERROR_COUNT), but acceptable" >> analysis-report.md
            echo "mypy_status=⚠️ PASSED WITH WARNINGS" >> $GITHUB_OUTPUT
          else
            echo "❌ **mypy**: Too many type checking issues found ($MYPY_ERROR_COUNT)" >> analysis-report.md
            echo "mypy_status=❌ FAILED" >> $GITHUB_OUTPUT
          fi
          echo "" >> analysis-report.md
          echo '```' >> analysis-report.md
          cat mypy-output.txt >> analysis-report.md
          echo '```' >> analysis-report.md
          echo "" >> analysis-report.md
        continue-on-error: true

      - name: Generate final report summary
        id: summary
        run: |
          # Debug: Show what outputs we received
          echo "Debug - Step outputs:"
          echo "Black: ${{ steps.black.outputs.black_status }}"
          echo "isort: ${{ steps.isort.outputs.isort_status }}"
          echo "flake8: ${{ steps.flake8.outputs.flake8_status }}"
          echo "pylint: ${{ steps.pylint.outputs.pylint_status }}"
          echo "mypy: ${{ steps.mypy.outputs.mypy_status }}"

          # Prepare the final report with header
          {
            echo "## 🧪 Python Static Code Analysis Report"
            echo ""
            echo "| Tool | Status |"
            echo "|------|--------|"
            echo "| **Black** | ${{ steps.black.outputs.black_status }} |"
            echo "| **isort** | ${{ steps.isort.outputs.isort_status }} |"
            echo "| **flake8** | ${{ steps.flake8.outputs.flake8_status }} |"
            echo "| **pylint** | ${{ steps.pylint.outputs.pylint_status }} |"
            echo "| **mypy** | ${{ steps.mypy.outputs.mypy_status }} |"
            echo ""
          } > final-report.md

          # Add the detailed analysis
          cat analysis-report.md >> final-report.md

          # Determine overall status by checking individual step outputs
          FAILED_COUNT=0
          WARNING_COUNT=0
          if [[ "${{ steps.black.outputs.black_status }}" == *"FAILED"* ]]; then
            FAILED_COUNT=$((FAILED_COUNT + 1))
          elif [[ "${{ steps.black.outputs.black_status }}" == *"WARNINGS"* ]]; then
            WARNING_COUNT=$((WARNING_COUNT + 1))
          fi
          if [[ "${{ steps.isort.outputs.isort_status }}" == *"FAILED"* ]]; then
            FAILED_COUNT=$((FAILED_COUNT + 1))
          elif [[ "${{ steps.isort.outputs.isort_status }}" == *"WARNINGS"* ]]; then
            WARNING_COUNT=$((WARNING_COUNT + 1))
          fi
          if [[ "${{ steps.flake8.outputs.flake8_status }}" == *"FAILED"* ]]; then
            FAILED_COUNT=$((FAILED_COUNT + 1))
          elif [[ "${{ steps.flake8.outputs.flake8_status }}" == *"WARNINGS"* ]]; then
            WARNING_COUNT=$((WARNING_COUNT + 1))
          fi
          if [[ "${{ steps.pylint.outputs.pylint_status }}" == *"FAILED"* ]]; then
            FAILED_COUNT=$((FAILED_COUNT + 1))
          elif [[ "${{ steps.pylint.outputs.pylint_status }}" == *"WARNINGS"* ]]; then
            WARNING_COUNT=$((WARNING_COUNT + 1))
          fi
          if [[ "${{ steps.mypy.outputs.mypy_status }}" == *"FAILED"* ]]; then
            FAILED_COUNT=$((FAILED_COUNT + 1))
          elif [[ "${{ steps.mypy.outputs.mypy_status }}" == *"WARNINGS"* ]]; then
            WARNING_COUNT=$((WARNING_COUNT + 1))
          fi

          echo "Debug - Failed count: $FAILED_COUNT, Warning count: $WARNING_COUNT"

          if [ $FAILED_COUNT -gt 2 ]; then
            echo "overall_status=❌ Too many critical issues found" >> $GITHUB_OUTPUT
            echo "overall_success=false" >> $GITHUB_OUTPUT
            echo "Debug - Setting overall_success=false"
          elif [ $FAILED_COUNT -gt 0 ] || [ $WARNING_COUNT -gt 0 ]; then
            echo "overall_status=⚠️ Code quality acceptable with minor issues" >> $GITHUB_OUTPUT
            echo "overall_success=true" >> $GITHUB_OUTPUT
            echo "Debug - Setting overall_success=true (with warnings)"
          else
            echo "overall_status=✅ All checks passed perfectly" >> $GITHUB_OUTPUT
            echo "overall_success=true" >> $GITHUB_OUTPUT
            echo "Debug - Setting overall_success=true"
          fi

          # Add footer
          echo "" >> final-report.md
          echo "---" >> final-report.md
          echo "*Report generated on $(date -u '+%Y-%m-%d %H:%M:%S UTC') by GitHub Actions*" >> final-report.md

      - name: Find existing comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "🧪 Python Static Code Analysis Report"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          body-path: final-report.md
          edit-mode: replace
          reactions: |
            ${{ steps.summary.outputs.overall_success == 'true' && '+1' || 'confused' }}

      - name: Upload analysis report as artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: python-static-analysis-report-${{ github.sha }}
          path: final-report.md
          retention-days: 30

      - name: Upload detailed logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-logs-${{ github.sha }}
          path: |
            *-output.txt
            analysis-report.md
          retention-days: 7

      - name: Set workflow status
        run: |
          echo "Debug - Final check: overall_success = '${{ steps.summary.outputs.overall_success }}'"
          if [ "${{ steps.summary.outputs.overall_success }}" = "false" ]; then
            echo "❌ Static code analysis found issues"
            exit 1
          else
            echo "✅ All static code analysis checks passed"
          fi
