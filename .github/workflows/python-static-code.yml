name: Python Static Analysis with Pylint

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  pylint-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install analysis tools
        run: |
          python -m pip install --upgrade pip
          pip install pylint coverage pytest pytest-cov

      - name: Find Python files
        id: find-files
        run: |
          # Find all Python files in the repository
          python_files=$(find . -name "*.py" -not -path "./.*" -not -path "./venv/*" -not -path "./env/*" -not -path "./__pycache__/*" -not -path "./build/*" -not -path "./dist/*" | sort)
          
          if [ -z "$python_files" ]; then
            echo "No Python files found in repository"
            echo "has_python_files=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Found Python files:"
          echo "$python_files"
          echo "has_python_files=true" >> $GITHUB_OUTPUT
          
          # Save files list for later use
          echo "$python_files" > python_files.txt

      - name: Run Pylint Analysis
        id: pylint
        if: steps.find-files.outputs.has_python_files == 'true'
        run: |
          echo "Starting comprehensive Pylint analysis..."
          
          # Create comprehensive pylint configuration inline
          cat > .pylintrc << 'EOF'
          [MASTER]
          jobs=1
          persistent=yes
          load-plugins=
          unsafe-load-any-extension=no
          extension-pkg-whitelist=
          
          [MESSAGES CONTROL]
          # Enable all messages by default, then disable only truly minor ones
          disable=missing-module-docstring,missing-class-docstring,missing-function-docstring,line-too-long,invalid-name,too-few-public-methods,consider-using-f-string
          
          # Critical security and error patterns that MUST block merges
          enable=dangerous-default-value,eval-used,exec-used,bare-except,broad-except,unused-import,unused-variable,undefined-variable,used-before-assignment,no-member,import-error,syntax-error
          
          [REPORTS]
          output-format=text
          reports=yes
          score=yes
          msg-template={path}:{line}:{column}: [{msg_id}({symbol}), {obj}] {msg}
          
          [FORMAT]
          max-line-length=88
          max-module-lines=1000
          indent-string='    '
          
          [VARIABLES]
          dummy-variables-rgx=_+$|(_[a-zA-Z0-9_]*[a-zA-Z0-9]+?$)|dummy|^ignored_|^unused_
          
          [BASIC]
          good-names=i,j,k,ex,Run,_,x,y,z,id,pk,db,ui
          bad-names=foo,bar,baz,toto,tutu,tata
          
          [DESIGN]
          max-args=7
          max-locals=15
          max-returns=6
          max-branches=12
          max-statements=50
          max-parents=7
          max-attributes=15
          min-public-methods=1
          max-public-methods=25
          max-bool-expr=5
          EOF
          
          # Run Pylint with comprehensive reporting
          set +e  # Don't exit on error immediately
          
          echo "Running Pylint analysis on all Python files..."
          pylint --rcfile=.pylintrc $(cat python_files.txt) > pylint_full_output.txt 2>&1
          PYLINT_EXIT_CODE=$?
          
          echo "Pylint exit code: $PYLINT_EXIT_CODE"
          
          # Parse Pylint output for detailed statistics
          echo "Parsing Pylint results..."
          
          # Extract score
          PYLINT_SCORE=$(grep -o "Your code has been rated at [0-9.-]*" pylint_full_output.txt | grep -o "[0-9.-]*" | head -1 || echo "0")
          echo "Pylint score: $PYLINT_SCORE"
          
          # Count message types
          ERROR_COUNT=$(grep -c "\[E[0-9]*" pylint_full_output.txt || echo "0")
          WARNING_COUNT=$(grep -c "\[W[0-9]*" pylint_full_output.txt || echo "0") 
          REFACTOR_COUNT=$(grep -c "\[R[0-9]*" pylint_full_output.txt || echo "0")
          CONVENTION_COUNT=$(grep -c "\[C[0-9]*" pylint_full_output.txt || echo "0")
          FATAL_COUNT=$(grep -c "\[F[0-9]*" pylint_full_output.txt || echo "0")
          
          # Count critical security issues
          CRITICAL_SECURITY=$(grep -c -E "(dangerous-default-value|eval-used|exec-used|bare-except)" pylint_full_output.txt || echo "0")
          
          # Count total issues
          TOTAL_ISSUES=$((ERROR_COUNT + WARNING_COUNT + REFACTOR_COUNT + CONVENTION_COUNT + FATAL_COUNT))
          BLOCKING_ISSUES=$((ERROR_COUNT + FATAL_COUNT + CRITICAL_SECURITY))
          WARNING_REFACTOR_COMBINED=$((WARNING_COUNT + REFACTOR_COUNT))
          
          echo "Issue counts:"
          echo "- Fatal: $FATAL_COUNT"
          echo "- Errors: $ERROR_COUNT" 
          echo "- Warnings: $WARNING_COUNT"
          echo "- Refactor: $REFACTOR_COUNT"
          echo "- Convention: $CONVENTION_COUNT"
          echo "- Critical Security: $CRITICAL_SECURITY"
          echo "- Total Issues: $TOTAL_ISSUES"
          echo "- Blocking Issues: $BLOCKING_ISSUES"
          echo "- Warning+Refactor: $WARNING_REFACTOR_COMBINED"
          
          # Set outputs for later steps
          echo "pylint_score=$PYLINT_SCORE" >> $GITHUB_OUTPUT
          echo "error_count=$ERROR_COUNT" >> $GITHUB_OUTPUT
          echo "warning_count=$WARNING_COUNT" >> $GITHUB_OUTPUT
          echo "refactor_count=$REFACTOR_COUNT" >> $GITHUB_OUTPUT
          echo "convention_count=$CONVENTION_COUNT" >> $GITHUB_OUTPUT
          echo "fatal_count=$FATAL_COUNT" >> $GITHUB_OUTPUT
          echo "critical_security_count=$CRITICAL_SECURITY" >> $GITHUB_OUTPUT
          echo "total_issues=$TOTAL_ISSUES" >> $GITHUB_OUTPUT
          echo "blocking_issues=$BLOCKING_ISSUES" >> $GITHUB_OUTPUT
          echo "warning_refactor_combined=$WARNING_REFACTOR_COMBINED" >> $GITHUB_OUTPUT
          
          # Determine if pipeline should fail based on strict rules
          SHOULD_FAIL="false"
          FAIL_REASON=""
          
          if [ $BLOCKING_ISSUES -gt 0 ]; then
            SHOULD_FAIL="true"
            FAIL_REASON="Critical issues found: $FATAL_COUNT Fatal, $ERROR_COUNT Errors, $CRITICAL_SECURITY Critical Security"
          elif [ $WARNING_REFACTOR_COMBINED -gt 10 ]; then
            SHOULD_FAIL="true" 
            FAIL_REASON="Too many warnings/refactor suggestions: $WARNING_REFACTOR_COMBINED (threshold: 10)"
          fi
          
          echo "should_fail=$SHOULD_FAIL" >> $GITHUB_OUTPUT
          echo "fail_reason=$FAIL_REASON" >> $GITHUB_OUTPUT
          
          echo "Analysis decision: Should fail = $SHOULD_FAIL"
          if [ "$SHOULD_FAIL" = "true" ]; then
            echo "Fail reason: $FAIL_REASON"
          fi

      - name: Run Coverage Analysis
        id: coverage
        if: steps.find-files.outputs.has_python_files == 'true'
        run: |
          echo "Running coverage analysis..."
          
          # Look for test files
          TEST_FILES=$(find . -name "*test*.py" -o -name "test_*.py" -not -path "./venv/*" -not -path "./env/*" | head -20)
          
          if [ -n "$TEST_FILES" ]; then
            echo "Found test files, running coverage..."
            set +e
            python -m pytest --cov=. --cov-report=term-missing --cov-report=term $(cat python_files.txt | head -10) > coverage_output.txt 2>&1
            COVERAGE_EXIT_CODE=$?
            set -e
            
            # Extract coverage percentage
            COVERAGE_PERCENT=$(grep -o "TOTAL.*[0-9]\+%" coverage_output.txt | grep -o "[0-9]\+%" | grep -o "[0-9]\+" || echo "0")
            
            echo "Coverage: $COVERAGE_PERCENT%"
            echo "coverage_percent=$COVERAGE_PERCENT" >> $GITHUB_OUTPUT
            echo "has_coverage=true" >> $GITHUB_OUTPUT
            
            # Print coverage to logs (always visible)
            echo "=== COVERAGE REPORT ==="
            cat coverage_output.txt
            echo "======================="
          else
            echo "No test files found, skipping coverage"
            echo "coverage_percent=0" >> $GITHUB_OUTPUT
            echo "has_coverage=false" >> $GITHUB_OUTPUT
            echo "No coverage data available" > coverage_output.txt
          fi

      - name: Generate Comprehensive Report
        id: report
        if: steps.find-files.outputs.has_python_files == 'true'
        run: |
          echo "Generating comprehensive analysis report..."
          
          # Get all the metrics from previous steps
          SCORE="${{ steps.pylint.outputs.pylint_score }}"
          ERRORS="${{ steps.pylint.outputs.error_count }}"
          WARNINGS="${{ steps.pylint.outputs.warning_count }}"
          REFACTOR="${{ steps.pylint.outputs.refactor_count }}"
          CONVENTION="${{ steps.pylint.outputs.convention_count }}"
          FATAL="${{ steps.pylint.outputs.fatal_count }}"
          CRITICAL_SEC="${{ steps.pylint.outputs.critical_security_count }}"
          TOTAL="${{ steps.pylint.outputs.total_issues }}"
          SHOULD_FAIL="${{ steps.pylint.outputs.should_fail }}"
          FAIL_REASON="${{ steps.pylint.outputs.fail_reason }}"
          COVERAGE="${{ steps.coverage.outputs.coverage_percent }}"
          HAS_COVERAGE="${{ steps.coverage.outputs.has_coverage }}"
          
          # Determine overall status emoji and message
          if [ "$SHOULD_FAIL" = "true" ]; then
            STATUS_EMOJI="❌"
            STATUS_MESSAGE="ANALYSIS FAILED - MERGE BLOCKED"
            OVERALL_STATUS="failed"
          else
            STATUS_EMOJI="✅" 
            STATUS_MESSAGE="ANALYSIS PASSED"
            OVERALL_STATUS="passed"
          fi
          
          # Create comprehensive markdown report
          cat > analysis_report.md << EOF
          # 🐍 Python Static Analysis Report
          
          ## $STATUS_EMOJI $STATUS_MESSAGE
          
          ### 📊 Summary Statistics
          
          | Metric | Value | Status |
          |--------|-------|--------|
          | **Pylint Score** | $SCORE/10.0 | $([ "$(echo "$SCORE >= 8.0" | bc -l 2>/dev/null || echo 0)" -eq 1 ] && echo "✅ Excellent" || [ "$(echo "$SCORE >= 6.0" | bc -l 2>/dev/null || echo 0)" -eq 1 ] && echo "⚠️ Good" || echo "❌ Needs Work") |
          | **Total Issues** | $TOTAL | $([ $TOTAL -eq 0 ] && echo "✅ Perfect" || [ $TOTAL -lt 10 ] && echo "⚠️ Minor" || echo "❌ Major") |
          | **Coverage** | $COVERAGE% | $([ "$HAS_COVERAGE" = "true" ] && ([ $COVERAGE -ge 80 ] && echo "✅ Excellent" || [ $COVERAGE -ge 60 ] && echo "⚠️ Good" || echo "❌ Poor") || echo "➖ No Tests") |
          
          ### 🔍 Issue Breakdown
          
          | Issue Type | Count | Severity |
          |------------|-------|----------|
          | 🔥 **Fatal** | $FATAL | $([ $FATAL -gt 0 ] && echo "❌ BLOCKS MERGE" || echo "✅ None") |
          | ❌ **Errors** | $ERRORS | $([ $ERRORS -gt 0 ] && echo "❌ BLOCKS MERGE" || echo "✅ None") |
          | 🔒 **Critical Security** | $CRITICAL_SEC | $([ $CRITICAL_SEC -gt 0 ] && echo "❌ BLOCKS MERGE" || echo "✅ None") |
          | ⚠️ **Warnings** | $WARNINGS | $([ $WARNINGS -gt 5 ] && echo "⚠️ High" || [ $WARNINGS -gt 0 ] && echo "ℹ️ Minor" || echo "✅ None") |
          | 🔄 **Refactor** | $REFACTOR | $([ $REFACTOR -gt 5 ] && echo "⚠️ High" || [ $REFACTOR -gt 0 ] && echo "ℹ️ Minor" || echo "✅ None") |
          | 📝 **Convention** | $CONVENTION | $([ $CONVENTION -gt 10 ] && echo "ℹ️ Many" || [ $CONVENTION -gt 0 ] && echo "ℹ️ Some" || echo "✅ None") |
          
          ### 🚦 Quality Gates
          
          | Gate | Threshold | Current | Status |
          |------|-----------|---------|--------|
          | **No Critical Issues** | 0 Fatal + 0 Errors + 0 Security | $FATAL + $ERRORS + $CRITICAL_SEC = $(($FATAL + $ERRORS + $CRITICAL_SEC)) | $([ $(($FATAL + $ERRORS + $CRITICAL_SEC)) -eq 0 ] && echo "✅ PASSED" || echo "❌ FAILED") |
          | **Warning/Refactor Limit** | ≤ 10 combined | $WARNINGS + $REFACTOR = $(($WARNINGS + $REFACTOR)) | $([ $(($WARNINGS + $REFACTOR)) -le 10 ] && echo "✅ PASSED" || echo "❌ FAILED") |
          
          EOF
          
          # Add failure details if applicable
          if [ "$SHOULD_FAIL" = "true" ]; then
            cat >> analysis_report.md << EOF
          ### 🚫 Blocking Issues Found
          
          **Reason for blocking merge:**
          \`\`\`
          $FAIL_REASON
          \`\`\`
          
          **Action Required:**
          - Fix all Fatal errors and critical Errors
          - Address critical security issues (eval-used, bare-except, etc.)
          - Reduce Warning/Refactor count to ≤ 10 if applicable
          - Re-run the analysis after fixes
          
          EOF
          fi
          
          # Add detailed pylint output
          cat >> analysis_report.md << EOF
          ### 📋 Detailed Pylint Output
          
          <details>
          <summary>Click to expand full Pylint report</summary>
          
          \`\`\`
          EOF
          cat pylint_full_output.txt >> analysis_report.md
          cat >> analysis_report.md << EOF
          \`\`\`
          
          </details>
          
          EOF
          
          # Add coverage details if available
          if [ "$HAS_COVERAGE" = "true" ]; then
            cat >> analysis_report.md << EOF
          ### 📊 Coverage Details
          
          <details>
          <summary>Click to expand coverage report</summary>
          
          \`\`\`
          EOF
            cat coverage_output.txt >> analysis_report.md
            cat >> analysis_report.md << EOF
          \`\`\`
          
          </details>
          
          EOF
          fi
          
          # Add footer
          cat >> analysis_report.md << EOF
          ---
          
          **Analysis completed:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')  
          **Commit:** \`${{ github.sha }}\`  
          **Triggered by:** ${{ github.event_name }}
          
          *This report was automatically generated by GitHub Actions static analysis workflow.*
          EOF
          
          echo "overall_status=$OVERALL_STATUS" >> $GITHUB_OUTPUT

      - name: Display Results in Job Summary
        if: steps.find-files.outputs.has_python_files == 'true'
        run: |
          echo "Adding results to job summary..."
          cat analysis_report.md >> $GITHUB_STEP_SUMMARY

      - name: Find existing PR comment
        if: github.event_name == 'pull_request' && steps.find-files.outputs.has_python_files == 'true'
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "🐍 Python Static Analysis Report"

      - name: Create or Update PR Comment
        if: github.event_name == 'pull_request' && steps.find-files.outputs.has_python_files == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          body-path: analysis_report.md
          edit-mode: replace
          reactions: |
            ${{ steps.report.outputs.overall_status == 'passed' && '+1' || '-1' }}

      - name: Upload Analysis Artifacts
        if: always() && steps.find-files.outputs.has_python_files == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pylint-analysis-report-${{ github.sha }}
          path: |
            analysis_report.md
            pylint_full_output.txt
            coverage_output.txt
            .pylintrc
          retention-days: 30

      - name: Final Status Check
        if: steps.find-files.outputs.has_python_files == 'true'
        run: |
          echo "=== FINAL ANALYSIS RESULTS ==="
          echo "Overall Status: ${{ steps.report.outputs.overall_status }}"
          echo "Should Fail: ${{ steps.pylint.outputs.should_fail }}"
          echo "Blocking Issues: ${{ steps.pylint.outputs.blocking_issues }}"
          echo "Warning+Refactor: ${{ steps.pylint.outputs.warning_refactor_combined }}"
          echo "Pylint Score: ${{ steps.pylint.outputs.pylint_score }}"
          echo "============================="
          
          if [ "${{ steps.pylint.outputs.should_fail }}" = "true" ]; then
            echo ""
            echo "❌ STATIC ANALYSIS FAILED"
            echo "Reason: ${{ steps.pylint.outputs.fail_reason }}"
            echo ""
            echo "The pipeline is being terminated due to code quality issues."
            echo "Please review the detailed report above and fix the issues before merging."
            exit 1
          else
            echo ""
            echo "✅ STATIC ANALYSIS PASSED"
            echo "Code quality meets the required standards."
            echo ""
          fi

      - name: Handle No Python Files
        if: steps.find-files.outputs.has_python_files == 'false'
        run: |
          echo "No Python files found in repository - skipping static analysis"
          echo "## ℹ️ No Python Files Found" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This repository does not contain any Python files to analyze." >> $GITHUB_STEP_SUMMARY
          echo "Static analysis was skipped." >> $GITHUB_STEP_SUMMARY
